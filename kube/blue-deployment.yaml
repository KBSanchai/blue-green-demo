apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-blue
  namespace: default
  labels:
    app: demo-app
    slot: blue
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo-app
      slot: blue
  template:
    metadata:
      labels:
        app: demo-app
        slot: blue
        version: "1.0.0"
    spec:
      containers:
      - name: app
        image: <DOCKERHUB_USER>/blue-app:latest
        ports:
        - containerPort: 3000
        env:
        - name: APP_COLOR
          value: blue
        resources:
          requests: { memory: "64Mi", cpu: "100m" }
          limits: { memory: "128Mi", cpu: "250m" }
        livenessProbe:
          httpGet: { path: /health, port: 3000 }
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet: { path: /health, port: 3000 }
          initialDelaySeconds: 5
          periodSeconds: 5