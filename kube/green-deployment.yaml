apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  namespace: default
  labels:
    app: demo-app
    slot: green
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo-app
      slot: green
  template:
    metadata:
      labels:
        app: demo-app
        slot: green
    spec:
      containers:
      - name: app
        image: your-dockerhub-username/green-app:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5